<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ST Simulátor - Nastavenia</title>

  <!-- Bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tvoje štýly -->
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/simulator.css">
  <link rel="stylesheet" href="style/HMI.css">
  <link rel="stylesheet" href="style/settings.css">

  
  <script src="scripts/settings_managers.js"></script>
</head>

<body class="settings-page">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand mb-0 h1" href="#">ST Simulátor</a>

    <ul class="navbar-nav d-flex flex-row gap-3 ms-auto align-items-center flex-nowrap">
      <li class="nav-item">
        <a class="nav-link nav-tab" href="simulator.html">Simulátor</a>
      </li>
      <li class="nav-item">
        <a class="nav-link nav-tab active" href="settings.html">Nastavenia</a>
      </li>
    </ul>
  </nav>

  <div class="simulator-layout">
    <div class="split-container">

      <!-- TOOLBOX -->
      <div class="toolbox">
        <div class="inner">
          <h6 class="mb-3">Nastavenia</h6>

          <div class="list-group list-group-flush">
            <button class="list-group-item list-group-item-action active" data-section="modbus">
              Modbus
            </button>
            <button class="list-group-item list-group-item-action" data-section="simulation">
              Simulácia
            </button>
          </div>
        </div>

        <div class="toolbox-footer d-grid gap-2">
          <button class="btn btn-sm btn-success" id="btn-save">Uložiť</button>
          <button class="btn btn-sm btn-outline-light" id="btn-reset">Obnoviť default</button>
        </div>
      </div>

      <!-- MAIN -->
      <div class="main-panel">
        <div class="inner">
          <div class="settings-content">
            <div class="settings-card">
              <!-- MODBUS -->
              <div id="section-modbus" class="settings-section">
                <div class="row g-3">
                  <div class="col-md-8">
                    <label class="form-label">Host (IP / hostname)</label>
                    <input class="form-control form-control-sm" id="mb-host" value="127.0.0.1">
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Port</label>
                    <input class="form-control form-control-sm" id="mb-port" type="number" value="1502" min="1" max="65535">
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Unit ID</label>
                    <input class="form-control form-control-sm" id="mb-unit" type="number" value="1" min="0" max="255">
                  </div>

                  <div class="col-md-4">
                    <label class="form-label">Ticks (ms)</label>
                    <input class="form-control form-control-sm" id="mb-ticks" type="number" value="500" min="10" step="10">
                  </div>

                  <div class="d-flex justify-content-center mt-4">
                    <div class="alert alert-warning text-center py-4 px-4" style="max-width: 900px; line-height: 1.6;">
                      <div class="fw-bold mb-2">Upozornenie:</div>
                      <p class="m-0">Pri zmene nastavení Modbus komunikácie môže dôjsť k automatickému odpojeniu spojenia alebo k nežiaducemu správaniu systému.</p>
                    </div>
                  </div>

                </div>
              </div>

              <!-- SIMULÁCIA -->
              <div id="section-simulation" class="settings-section d-none">
                <div class="row g-3 mt-1">
                  <div class="col-md-6">
                    <label class="form-label">Theme</label>
                    <select class="form-select form-select-sm" id="sim-theme">
                      <option value="dark" selected>Dark</option>
                      <option value="light">Light</option>
                    </select>
                  </div>

                  <div class="debug-item">
                  <input type="checkbox" id="dbg-stats">
                  <label for="dbg-stats">Debug stats</label>
                  </div>

                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // prepínanie sekcií
    const menuBtns = document.querySelectorAll('.list-group-item[data-section]');
    const sections = {
      modbus: document.getElementById('section-modbus'),
      simulation: document.getElementById('section-simulation'),
    };

    function showSection(key) {
      Object.values(sections).forEach(s => s.classList.add('d-none'));
      sections[key]?.classList.remove('d-none');

      menuBtns.forEach(b => b.classList.remove('active'));
      document.querySelector(`.list-group-item[data-section="${key}"]`)?.classList.add('active');
    }

    menuBtns.forEach(btn =>
      btn.addEventListener('click', () => showSection(btn.dataset.section))
    );

    document.addEventListener("DOMContentLoaded", async () => {
      if (!window.Settings) {
        console.error("SettingsManager nie je načítaný!");
        return;
      }

      const themeSelect = document.getElementById("sim-theme");
      const btnSave = document.getElementById("btn-save");
      const btnReset = document.getElementById("btn-reset");

      // helper: naplň UI z configu (SAFE)
      function fillFormFromConfig(cfg) {
        cfg = cfg || {};
        cfg.modbus = cfg.modbus || {};
        cfg.debug = cfg.debug || {};

        // Modbus
        document.getElementById("mb-host").value  = cfg.modbus.host ?? "";
        document.getElementById("mb-port").value  = cfg.modbus.port ?? 1502;
        document.getElementById("mb-unit").value  = cfg.modbus.unitId ?? 1;
        document.getElementById("mb-ticks").value = cfg.modbus.tickMs ?? 500;

        // Theme + debug
        themeSelect.value = cfg.theme ?? "dark";
        document.getElementById("dbg-stats").checked = !!cfg.debug.stats;
      }

      // helper: zober hodnoty z formulára a nastav do Settings
      function applyFormToSettings() {
        Settings.set("modbus.host", document.getElementById("mb-host").value.trim());
        Settings.set("modbus.port", Number(document.getElementById("mb-port").value));
        Settings.set("modbus.unitId", Number(document.getElementById("mb-unit").value));
        Settings.set("modbus.tickMs", Number(document.getElementById("mb-ticks").value));

        Settings.set("debug.stats", !!document.getElementById("dbg-stats").checked);
        Settings.set("theme", themeSelect.value);
      }

      // načítaj config zo servera
      await Settings.load();

      // nastav UI po load
      fillFormFromConfig(Settings.get());

      // keď sa zmení theme (iba lokálne do Settings, uloží sa až pri Save)
      themeSelect.addEventListener("change", () => {
        Settings.set("theme", themeSelect.value);
        console.log("Theme prepnutý na:", themeSelect.value);
      });

      // uložiť
      btnSave.addEventListener("click", async () => {
        try {
          applyFormToSettings();
          console.log("Ukladám config...");
          await Settings.save();
          console.log("Config uložený.");
        } catch (e) {
          console.error("Save zlyhal:", e);
        }
      });

      // reset + save (prepíše user_config.json na default)
      btnReset.addEventListener("click", async () => {
        try {
          console.log("Resetujem na default...");
          await Settings.resetAndSave();

          // po resete naplň UI z aktuálneho Settings stavu
          fillFormFromConfig(Settings.get());

          console.log("Reset na default + uložené.");
        } catch (e) {
          console.error("ResetAndSave zlyhal:", e);
        }
      });

      // defaultná sekcia
      showSection("modbus");
    });
  </script>
</body>
</html>
