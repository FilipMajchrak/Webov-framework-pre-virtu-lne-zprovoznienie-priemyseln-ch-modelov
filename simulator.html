<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand mb-0 h1" href="#">ST Simulátor</a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            Scény
          </a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" href="#" onclick="window.sceneManager.switchScene('scene1')">Scene 1</a></li>
            <li><a class="dropdown-item" href="#" onclick="window.sceneManager.switchScene('scene2')">Scene 2</a></li>
          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-tab active" href="simulator.html">Simulátor</a>
        </li>

        <li class="nav-item">
          <a class="nav-link nav-tab" href="settings.html">Nastavenia</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="simulator-layout">
    <div class="split-container">
      <!-- Ľavý panel -->
      <div class="toolbox">
        <div class="inner">
          <div class="io-table-wrapper flex-grow-1 d-flex flex-column">
            <h6 class="text-light">I/O Premenné</h6>
            <div class="flex-grow-1 overflow-auto">
              <table class="table table-dark table-sm table-bordered mb-0" id="io-table">
                <thead>
                  <tr><th>Názov</th><th>Typ</th><th>Hodnota</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Pravý panel -->
      <div class="main-panel">
        <div id="three-container"></div>
      </div>
    </div>
  </div>

  <!-- Načítanie hlavnej scény po načítaní DOM -->
  <script src="sim_scripts/threeScene.js"></script>
  <script src="sim_scripts/IOpanel.js"></script>
</body>

<script>
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await window.Settings.load();     // natiahne /api/config a aplikuje theme
    } catch (e) {
      console.warn("[Settings] load failed, fallback to default:", e);
      window.Settings.applyTheme();     // aspoň nastaví dark/light podľa defaultu
    }
  });

  let graphsWindow = null;
  let shouldOpenGraphsOnFirstClick = false;

  document.addEventListener("DOMContentLoaded", async () =>
  {
    if (!window.Settings)
    {
      console.error("SettingsManager nie je načítaný!");
      return;
    }

    try
    {
      await window.Settings.load();

      const cfg = window.Settings.get() || {};
      const debug = cfg.debug || {};

      console.log("Načítaný config:", cfg);
      console.log("debug.stats =", debug.stats);

      shouldOpenGraphsOnFirstClick = !!debug.stats;
    }
    catch (e)
    {
      console.warn("[Settings] load failed:", e);

      if (window.Settings.applyTheme)
      {
        window.Settings.applyTheme();
      }
    }
  });

  document.addEventListener("click", () =>
  {
    if (shouldOpenGraphsOnFirstClick)
    {
      if (!window.graphWindow || window.graphWindow.closed)
      {
        window.graphWindow = window.open(
          "graph.html",
          "graphsWindow",
          "width=900,height=600"
        );

        if (!window.graphWindow)
        {
          console.warn("Prehliadač zablokoval otvorenie graph.html aj po kliknutí.");
          return;
        }
      }

      shouldOpenGraphsOnFirstClick = false;
    }
  });

</script>
</html>
