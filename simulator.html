<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <title>ST Simulátor</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Štýly -->
  <link href="style/style.css" rel="stylesheet">
  <link href="style/HMI.css" rel="stylesheet">
  <link href="style/simulator.css" rel="stylesheet">

  <!-- THREE.js (verzia r124 - kompatibilná s Physijs) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>

  <!-- OBJLoader z rovnakej verzie -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.124.0/examples/js/loaders/OBJLoader.js"></script>

  <!-- Physijs -->
  <script src="sim_scripts/physi/physi.js"></script>

  <!-- Ostatné skripty projektu -->
  <script src="scripts/resize.js"></script>
  <script src="sim_scripts/camera.js"></script>
  <script src="sim_scripts/SceneManager.js"></script>
  <script src="sim_scripts/Scenes/Scene1.js"></script>
  <script src="sim_scripts/objects.js"></script>
  <script src="sim_scripts/detection.js"></script>
  <script src="sim_scripts/action_objects/conv.js"></script>
  <script src="sim_scripts/action_objects/sensor.js"></script>
  <script src="sim_scripts/action_objects/piston.js"></script>
  <script src="sim_scripts/action_objects/distance_sensor.js"></script>
  <script src="sim_scripts/debugtool.js"></script>
  <script src="PLC.js"></script>

</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand mb-0 h1">ST Simulátor</a>
    <ul class="navbar-nav d-flex flex-row gap-3 ms-auto align-items-center flex-nowrap">
      <li class="nav-item"><a class="nav-link nav-tab" href="index.html">Späť</a></li>
      <li class="nav-item"><a class="nav-link nav-tab" href="simulator.html">Simulátor</a></li>
    </ul>
  </nav>

  <div class="simulator-layout">
    <div class="split-container">
      <!-- Ľavý panel -->
      <div class="toolbox">
        <div class="inner">
          <div class="io-table-wrapper flex-grow-1 d-flex flex-column">
            <h6 class="text-light">I/O Premenné</h6>
            <div class="flex-grow-1 overflow-auto">
              <table class="table table-dark table-sm table-bordered mb-0" id="io-table">
                <thead>
                  <tr><th>Názov</th><th>Typ</th><th>Hodnota</th></tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- Pravý panel -->
      <div class="main-panel">
        <div id="three-container"></div>
      </div>
    </div>
  </div>

  <script>
  serverTCP._server?.on("connection", (socket) => {
  console.log("[MB] nový klient pripojený:", socket.remoteAddress, "port", socket.remotePort);
  socket.on("close", () => console.log("[MB] klient odpojený:", socket.remoteAddress));
  socket.on("error", (err) => console.error("[MB] socket error:", err.message));
  });
  </script>

  <!-- Načítanie hlavnej scény po načítaní DOM -->
  <script src="sim_scripts/threeScene.js"></script>
  <script src="sim_scripts/IOpanel.js"></script
</body>
</html>
