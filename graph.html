<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grafy</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="style/style.css" rel="stylesheet">
  <link href="style/HMI.css" rel="stylesheet">
  <link href="style/simulator.css" rel="stylesheet">
  <link rel="stylesheet" href="style/settings.css">
   <link rel="stylesheet" href="style/graphs.css">

  <script src="scripts/settings_managers.js"></script>
</head>

<body>
    <div class="container-fluid py-3">
        <div class="settings-card">
        <h4 class="mb-3">Grafy simulácie</h4>
        <div class="row g-3">
            <div class="col-12">
                <div class="graph-card">
                    <h6>FPS</h6>
                    <div class="graph-container">
                            <canvas id="fpsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () =>
    {
      if (!window.Settings)
      {
        console.error("SettingsManager nie je načítaný!");
        return;
      }

      try
      {
        await window.Settings.load();
      }
      catch (e)
      {
        console.warn("[Settings] load failed:", e);

        if (window.Settings.applyTheme)
        {
          window.Settings.applyTheme();
        }
      }
    });
  </script>
<script src="sim_scripts/graphs.js"></script>
</body>
</html>
