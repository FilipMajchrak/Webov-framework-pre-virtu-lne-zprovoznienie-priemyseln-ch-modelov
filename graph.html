<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grafy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="style/style.css" rel="stylesheet">
<link href="style/HMI.css" rel="stylesheet">
<link href="style/simulator.css" rel="stylesheet">
<link rel="stylesheet" href="style/settings.css">
<link rel="stylesheet" href="style/graphs.css">

<script src="scripts/settings_managers.js"></script>

</head>

  <body class="settings-page">

    <div class="graphs-wrapper">
    <h4>Grafy simulácie</h4>
    <div class="graph-card">
    <h6>FPS</h6>
      <div class="graph-container">
        <canvas id="fpsChart"></canvas>
      </div>
    </div>

    <hr>

    <div class="graph-card">
    <h6>Čas renderovania [ms]</h6>
      <div class="graph-container">
        <canvas id="renderChart"></canvas>
      </div>
    </div>

    <hr>

    <div class="graph-card">
    <h6>Oneskorenie [ms]</h6>
      <div class="graph-container">
        <canvas id="modbusChart"></canvas>
      </div>
    </div>

    <hr>

    <div class="graph-card">
    <h6>Čas spracovania komunikácie [ms]</h6>
      <div class="graph-container">
        <canvas id="tickChart"></canvas>
      </div>
    </div>

    <hr>

    <div class="graph-card">
    <h6>Jitter [ms]</h6>
      <div class="graph-container">
        <canvas id="jitterChart"></canvas>
      </div>
    </div>

    <div class="graph-row">

    <div class="graph-half">
      <div class="graph-card">
        <div class="graph-container">
          <canvas id="digitalOutChart"></canvas>
        </div>
      </div>
    </div>

    <div class="graph-half">
      <div class="graph-card">
        <div class="graph-container">
          <canvas id="digitalInChart"></canvas>
        </div>
      </div>
    </div>

    </div>

    <hr>

    <div class="graph-card">
      <div class="graph-container">
      <canvas id="analogOutChart"></canvas>
      </div>
    </div>

  </div>

<script>
document.addEventListener("DOMContentLoaded", async function ()
{
    if (!window.Settings)
    {
        console.error("SettingsManager nie je načítaný!");
        return;
    }

    try
    {
        await window.Settings.load();

        if (typeof window.Settings.applyTheme === "function")
        {
            window.Settings.applyTheme();
        }

        console.log("Theme po load:", document.body.className);
    }
    catch (e)
    {
        console.warn("[Settings] load failed:", e);

        if (window.Settings.applyTheme)
        {
            window.Settings.applyTheme();
        }
    }
});
</script>

<script src="sim_scripts/graphs.js"></script>

</body>
</html>
